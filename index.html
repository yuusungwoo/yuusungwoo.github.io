<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Search</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f8f9fa; }
        input { padding: 10px; width: 300px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Job Search</h1>
    <p>Search for jobs across Berlin Startup Jobs, Web3 Career, and We Work Remotely.</p>
    <form action="/search" method="GET">
        <input type="text" name="term" placeholder="Search for a skill (e.g. python, java)" required />
        <button type="submit">Search</button>
    </form>
</body>
</html>
